{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
/* ============================= */
/* DOMAIN SELECTION PAGE STYLE  */
/* ============================= */

.domain-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
}

.domain-card {
    background: #ffffff;
    padding: 40px;
    border-radius: 14px;
    width: 850px;
    max-width: 95%;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    text-align: center;
}

.domain-card h2 {
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 26px;
}

.subtitle {
    color: #777;
    margin-bottom: 35px;
    font-size: 14px;
}

.domain-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    margin-bottom: 35px;
}

.domain-option {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
    border-radius: 12px;
    border: 2px solid #e5e5e5;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
    background-color: #fafafa;
    position: relative;
}

/* Hide default checkbox */
.domain-option input[type="checkbox"] {
    display: none;
}

/* Hover effect */
.domain-option:hover {
    border-color: #4a90e2;
    background-color: #f0f7ff;
    transform: translateY(-3px);
}

/* Selected effect */
.domain-option input[type="checkbox"]:checked + .domain-name {
    color: #4a90e2;
    font-weight: 600;
}

.domain-option input[type="checkbox"]:checked + .domain-name::before {
    content: "✓ ";
    font-weight: bold;
}

/* Save Button */
.save-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background-color: #4a90e2;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

.save-btn:hover {
    background-color: #357bd8;
    transform: translateY(-2px);
}
</style>

<div class="domain-container">
    <div class="domain-card">
        <h2>Select Your Domains</h2>
        <p class="subtitle">Choose the domains you want to explore</p>

        <form method="POST">
            {% csrf_token %}

            <div class="domain-grid">
                {% for checkbox in form.domains %}
                    <label class="domain-option">
                        {{ checkbox.tag }}
                        <span class="domain-name">{{ checkbox.choice_label }}</span>
                    </label>
                {% endfor %}
            </div>

            <button type="submit" class="save-btn">
                Save Selection
            </button>
        </form>
    </div>
</div>

{% endblock %}
