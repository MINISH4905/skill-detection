{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="auth-card">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label>Password</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn-primary">Login</button>
    </form>

    <p class="switch-link">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </p>
</div>

{% endblock %}
